<html>
  <link
    rel="stylesheet"
    href="https://fonts.lightward.io/lightward-favorit.css"
  />

  <style>
    body {
      margin: 0;
      font-family: 'Lightward Favorit';
      font-weight: 200;
      background: #101010;
    }

    #content_root {
      width: 100vw;
      height: 100vh;
    }

    #content_root canvas {
      width: 100vw;
      height: 100vh;
      /* filter: blur(2px); */
    }

    #overlay {
      position: fixed;
      bottom: 20px;
      left: 20px;
    }

    #overlay > * {
      display: inline-block;
      margin: 0 0.5em;
    }

    #overlay div {
      width: 80px;
    }

    #timer {
      text-align: right;
    }
  </style>

  <body>
    <div id="content_root">
      <canvas id="aura_canvas"></canvas>
    </div>

    <div id="overlay">
      <button id="playpause_btn">Play/Pause</button>
      <button id="start_over_btn">Start Over</button>
      <div id="timer"></div>
      <div id="fps"></div>
    </div>

    <script src="dist/bundle.js"></script>
  </body>
</html>
