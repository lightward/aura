<html>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link id="favicon" rel="icon" type="image/png" href="favicon.png" />

  <script
    src="https://kit.fontawesome.com/42e9f97423.js"
    crossorigin="anonymous"
  ></script>

  <title>Lightward Aura</title>

  <link
    rel="stylesheet"
    href="https://fonts.lightward.io/lightward-favorit.css"
  />

  <style>
    body,
    button {
      margin: 0;
      font-family: 'Lightward Favorit';
      color: #fffbe7;
      font-weight: 200;
      background: #101010;
    }

    button {
      border-radius: 3px;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
    }

    #record_btn .fa-circle-stop {
      display: none;
    }

    #record_btn.recording .fa-circle-video {
      display: none;
    }

    #record_btn.recording .fa-circle-stop {
      display: inline;
    }

    #content_root {
      width: 100vw;
      height: 100vh;
    }

    #content_root canvas {
      width: 100vw;
      height: 100vh;
      /* filter: blur(2px); */
    }

    #overlay {
      position: fixed;
      bottom: 20px;
      left: 20px;
    }

    #overlay > * {
      display: inline-block;
      margin: 0 0.5em;
    }
  </style>

  <body>
    <div id="content_root">
      <canvas id="aura_canvas"></canvas>
    </div>

    <div id="overlay">
      <button id="playpause_btn"><i class="fa-solid fa-play-pause"></i></button>
      <button id="startover_btn">
        <i class="fa-solid fa-rotate-left"></i>
      </button>
      <button id="shuffle_btn"><i class="fa-solid fa-shuffle"></i></button>
      <button id="record_btn">
        <i class="fa-solid fa-circle-video"></i>
        <i class="fa-solid fa-circle-stop"></i>
      </button>
      <div id="seed"></div>
      <div id="time"></div>
    </div>

    <script src="dist/bundle.js"></script>
  </body>
</html>
