<html>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link id="favicon" rel="icon" type="image/png" href="favicon.png" />

  <script
    src="https://kit.fontawesome.com/42e9f97423.js"
    crossorigin="anonymous"
  ></script>

  <title>Lightward Aura</title>

  <link
    rel="stylesheet"
    href="https://fonts.lightward.io/lightward-favorit.css"
  />

  <style>
    html,
    body {
      color: #101010;
      background: #fffbe7;
    }

    body,
    button {
      margin: 0;
      font-family: 'Lightward Favorit';
      font-weight: 200;
    }

    button {
      border-radius: 3px;
      border: none;
      padding: 6px 0;
      cursor: pointer;
      width: 30px;
      text-align: center;

      color: #fffbe7;
      background: #101010;
    }

    #playpause_btn .fa-play {
      display: none;
    }
    #playpause_btn.paused .fa-pause {
      display: none;
    }
    #playpause_btn.paused .fa-play {
      display: inline;
    }

    #record_btn .fa-circle-stop {
      display: none;
    }
    #record_btn.recording .fa-circle-video {
      display: none;
    }
    #record_btn.recording .fa-circle-stop {
      display: inline;
    }

    #content_root {
      width: 100vw;
      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    #content_root canvas {
      width: 500px;
      height: 500px;

      width: 100%;
      height: 100%;

      box-shadow: 2px 2px 5px rgba(16, 16, 16, 0.2),
        2px 2px 20px rgba(16, 16, 16, 0.2);
    }

    #overlay {
      position: fixed;
      bottom: 20px;
      left: 20px;
    }

    #overlay > * {
      display: inline-block;
      margin: 0 0.5em;
    }
  </style>

  <body>
    <div id="content_root">
      <canvas id="aura_canvas"></canvas>
    </div>

    <div id="overlay">
      <button id="playpause_btn">
        <i class="fa-solid fa-play"></i>
        <i class="fa-solid fa-pause"></i>
      </button>
      <button id="startover_btn">
        <i class="fa-solid fa-rotate-left"></i>
      </button>
      <button id="shuffle_btn"><i class="fa-solid fa-shuffle"></i></button>
      <button id="record_btn">
        <i class="fa-solid fa-circle-video"></i>
        <i class="fa-solid fa-circle-stop"></i>
      </button>
      <button id="snapshot_btn">
        <i class="fa-solid fa-circle-camera"></i>
      </button>
      <div id="seed"></div>
      <div id="time"></div>
    </div>

    <script src="dist/bundle.js"></script>
  </body>
</html>
