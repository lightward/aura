<html>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link id="favicon" rel="icon" type="image/png" href="favicon.png" />

  <script
    src="https://kit.fontawesome.com/42e9f97423.js"
    crossorigin="anonymous"
  ></script>

  <title>Lightward Aura</title>

  <link
    rel="stylesheet"
    href="https://fonts.lightward.io/lightward-favorit.css"
  />
  <link
    rel="stylesheet"
    href="https://fonts.lightward.io/lightward-favorit-expanded.css"
  />

  <style>
    html,
    body {
      color: #101010;
      background: #fffbe7;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: 'Lightward Favorit';
      font-weight: 200;
    }

    canvas,
    img {
      cursor: pointer;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      z-index: 1;
    }

    img {
      z-index: 2;
    }

    #label,
    #controls {
      mix-blend-mode: hard-light;
    }

    #label {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 3;
      display: flex;
      gap: 1em;

      opacity: 1;
      transition: opacity 0.2s cubic-bezier(0.61, 1, 0.88, 1);
    }

    #label.hide {
      opacity: 0;
    }

    #label a {
      display: flex;
      align-items: center;
      background: #101010;
      border-radius: 5px;
      color: #fffbe7;
      text-decoration: underline;
      padding: 4px 8px;
    }

    #label a svg {
      fill: #fffbe7;
      width: 1em;
    }

    #controls {
      background: #101010;
      border-radius: 5px;
      left: 10vw;
      top: 10vh;
      position: absolute;
      z-index: 4;
      padding: 10px 55px 10px 15px;

      opacity: 1;
      transition: opacity 2s cubic-bezier(0.61, 1, 0.88, 1);
    }

    #controls h1 {
      padding: 0;
      margin: 0 0 10px;
      font-family: 'Lightward Favorit Expanded';
      text-transform: uppercase;
      white-space: nowrap;
      color: #fffbe7;
      font-weight: 200;
    }

    @media (max-width: 600px) {
      #controls {
        top: 0;
        left: 0;
        right: 0;
        border-radius: 0;
      }

      #controls h1 {
        white-space: normal;
      }
    }

    #controls.hide {
      opacity: 0;
    }

    #controls table {
      width: 100%;
      border-spacing: 10px;
      border-collapse: collapse;
    }

    #controls td,
    #controls th {
      color: #fffbe7;
      text-align: left;
    }
  </style>

  <body>
    <div id="root"></div>
    <script src="dist/bundle.js"></script>
  </body>
</html>
